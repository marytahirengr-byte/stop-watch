</head>
<body>

<div class="app">
  <p class="eyebrow">Chronograph</p>

  <div class="dial-wrap">
    <svg class="dial" viewBox="0 0 320 320">
      <circle class="track" cx="160" cy="160" r="140" />
      <circle class="progress" cx="160" cy="160" r="140" />
      <g id="ticks"></g>
    </svg>
    <div class="readout">
      <div id="time">00:00<span class="cs">.00</span></div>
      <div class="state" id="state">Ready</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn ghost" id="lapResetBtn" disabled>Lap</button>
    <button class="btn primary" id="startPauseBtn">Start</button>
  </div>

  <ol class="laps" id="laps"></ol>
</div>
